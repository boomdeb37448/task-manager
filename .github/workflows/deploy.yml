name: Deploy to Kubernetes

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          eval $(minikube docker-env)
          docker build -t task-manager-frontend:latest ./frontend

      - name: Build backend image
        run: |
          eval $(minikube docker-env)
          docker build -t task-manager-backend:latest ./backend

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/frontend -n task-manager
          kubectl rollout restart deployment/backend -n task-manager

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend -n task-manager --timeout=120s
          kubectl rollout status deployment/backend -n task-manager --timeout=120s

      - name: Verify pods
        run: kubectl get pods -n task-manager
