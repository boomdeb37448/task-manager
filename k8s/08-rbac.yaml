apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: task-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: task-manager
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-pod-reader
  namespace: task-manager
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: task-manager
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
