apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: task-manager
data:
  PORT: "5000"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: taskdb
  DB_USER: taskuser
  REDIS_HOST: redis
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: task-manager
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS tasks (
      id         SERIAL PRIMARY KEY,
      title      VARCHAR(255) NOT NULL,
      completed  BOOLEAN DEFAULT false,
      created_at TIMESTAMP DEFAULT NOW()
    );
    INSERT INTO tasks (title) VALUES
      ('Learn Docker basics'),
      ('Write a Dockerfile'),
      ('Set up docker-compose'),
      ('Deploy to Kubernetes');
